steps:
- key: gazelle
  label: ":deer: Gazelle"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect gazelle --check
  artifact_paths:
    - /workflows/artifacts/**/*

- key: buildifier
  label: ":hammer_and_wrench: Buildifier"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: bazel run //:buildifier.check
  artifact_paths:
    - /workflows/artifacts/**/*

- key: lint
  label: ":broom: Lint"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect lint //...
  artifact_paths:
    - /workflows/artifacts/**/*

- key: format
  label: ":hammer_and_wrench: Format"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect format
  artifact_paths:
    - /workflows/artifacts/**/*

- key: test_0
  label: ":bazel: Test"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect test --task-key=test_0 //... -//angular/... -//speller/...
  artifact_paths:
    - /workflows/artifacts/**/*
    - /workflows/testlogs/**/*

- key: test_1
  label: ":bazel: Test (1)"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect test --task-key=test_1 //angular/...
  artifact_paths:
    - /workflows/artifacts/**/*
    - /workflows/testlogs/**/*

- key: delivery
  if: build.branch == "main"
  label: ":bazel: Delivery"
  retry:
    manual:
      allowed: true
      permit_on_passed: false
    automatic:
    - limit: 1
      exit_status: 36
    - limit: 1
      exit_status: 255
    - limit: 1
      exit_status: -1
  agents:
    queue: aspect-default
  command: aspect delivery
  depends_on:
    - test_0
    - test_1
  artifact_paths:
    - /workflows/artifacts/**/*
