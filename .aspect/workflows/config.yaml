# See https://docs.aspect.build/aspect-workflows/additional-materials/reference-config
tasks:
  - gazelle:
  - buildifier:
  - lint:
  - format:
  - test:
      id: test_0
      targets:
        - //...
        - -//angular/...
        - -//speller/...
      bazel:
        flags:
          - --config=rbe
          - --test_tag_filters=-no-aw
  - test:
      id: test_1
      targets:
        - //angular/...
      bazel:
        flags:
          - --config=rbe
          - --test_tag_filters=-no-aw
  - delivery:
      auto_deliver: true
      stamp_flags:
        - --config=release
      rules:
        - deliverable: 'kind("oci_push rule", //...)'
          condition:
            branches:
              - '^main$'
              - '^release-.*$'
notifications:
  github: {}