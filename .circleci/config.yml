version: 2.1

workflows:
  aspect-workflows:
    jobs:
      - test
      - buildifier
      - format
      - gazelle
      - lint
      - delivery:
          requires:
            - test
    when:
      not:
        equal:
        - scheduled_pipeline
        - << pipeline.trigger_source >>
  aspect-workflows-warming:
    jobs:
      - warming
    when:
      and:
        - equal:
          - scheduled_pipeline
          - << pipeline.trigger_source >>
        - equal:
          - aspect-workflows-warming
          - << pipeline.schedule.name >>

jobs:
  test:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Test
          command: aspect test --task-key=test-cci -- //...

  buildifier:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Buildifier
          command: aspect format --task-key=buildifier-cci --formatter-target=@buildifier_prebuilt//buildifier

  format:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Format
          command: aspect format --task-key=format-cci

  gazelle:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Gazelle
          command: aspect gazelle --task-key=gazelle-cci

  lint:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Lint
          command: aspect lint  --task-key=lint-cci -- //...
  
  delivery:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Delivery
          command: aspect delivery --task-key=delivery-cci

  # TODO: migrate warming to AXL warming task once available
  warming:
    environment:
      ASPECT_WORKFLOWS_CIRCLE_PIPELINE_NUMBER: << pipeline.number >>
      ASPECT_WORKFLOWS_CIRCLE_PIPELINE_PROJECT_TYPE: << pipeline.project.type >>
      ASPECT_WORKFLOWS_CIRCLE_WORKFLOW_BASE_NAME: aspect-workflows
      ASPECT_WORKFLOWS_CONFIG: .aspect/workflows/config.yaml
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - run:
          name: Workflows environment
          command: /etc/aspect/workflows/bin/configure_workflows_env
      - checkout
      - run:
          name: Agent health check
          command: /etc/aspect/workflows/bin/agent_health_check
      - run:
          name: Create warming archive for root
          command: rosetta run warming
      - run:
          name: Archive warming tars
          command: /etc/aspect/workflows/bin/warming_archive
