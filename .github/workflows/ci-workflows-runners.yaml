name: CI - Aspect Workflows (Workflows runners)

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
        force_targets:
            description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
            required: false
            default: ""

permissions:
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Test
              run: aspect test --task-key=test-gha -- //...

    gazelle:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Gazelle
              run: aspect gazelle --task-key=gazelle-gha

    format:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Format
              run: aspect format --task-key=format-gha

    buildifier:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Buildifier
              run: aspect buildifier --task-key=buildifier-gha

    lint:
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Lint
              run: aspect lint --task-key=lint-gha -- //...


    delivery:
        needs: [test]
        runs-on: [self-hosted, aspect-workflows, aspect-default]
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: aspect-build/setup-aspect@36c688a9bbb0c84d55d7eca31bf3215e9d265bff # v2026.24.1
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Delivery
              run: aspect delivery --task-key=delivery-gha
