name: CI - Aspect Workflows (Github runners)

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
        force_targets:
            description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
            required: false
            default: ""

permissions:
    id-token: write

env:
    ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    INSTALL_ASPECT_LAUNCHER_VERSION: 2026.22.3

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-test
                repository-cache: true
                external-cache: true
            - name: Test
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                aspect test --task-key=test-gha-ephemeral -- //...

    gazelle:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-gazelle
                repository-cache: true
                external-cache: true
            - name: Gazelle
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                aspect gazelle --task-key=gazelle-gha-ephemeral

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-format
                repository-cache: true
                external-cache: true
            - name: Format
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                aspect format --task-key=format-gha-ephemeral

    buildifier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-buildifier
                repository-cache: true
                external-cache: true
            - name: Buildifier
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                aspect format --task-key=buildifier-gha-ephemeral --formatter-target=//tools/format:format-starlark

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-lint
                repository-cache: true
                external-cache: true
            - name: Lint
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                aspect lint --task-key=lint-gha-ephemeral -- //...


    delivery:
        needs: [test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}-delivery
                repository-cache: true
                external-cache: true
            - name: Delivery
              run: |
                curl -fsSL https://install.aspect.build | bash -s -- "$INSTALL_ASPECT_LAUNCHER_VERSION"
                # We pass --track-state=false --mode=always to disable selective delivery which is currently
                # only supported on Aspect Workflows CI runners as it requires a backend service
                aspect delivery --task-key=delivery-gha-ephemeral --track-state=false --mode=always
