name: CI - Aspect Workflows (Github runners)

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
        force_targets:
            description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
            required: false
            default: ""

permissions:
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Test
              run: aspect test --task:name=test-gha-ephemeral -- //...

    gazelle:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Gazelle
              run: aspect gazelle --task:name=gazelle-gha-ephemeral

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Format
              run: aspect format --task:name=format-gha-ephemeral

    buildifier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Buildifier
              run: aspect buildifier --task:name=buildifier-gha-ephemeral

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Lint
              run: aspect lint --task:name=lint-gha-ephemeral -- //...


    delivery:
        needs: [test]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                fetch-depth: 0 # tags required for workspace status command
            - uses: aspect-build/setup-aspect@7d93c420bbaa64d7ee6057770b8d0d4a3307c76a # v2026.26.5
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Delivery
              run: |
                # We pass --track-state=false --mode=always to disable selective delivery which is currently
                # only supported on Aspect Workflows CI runners as it requires a backend service
                aspect delivery --task:name=delivery-gha-ephemeral --track-state=false --mode=always
